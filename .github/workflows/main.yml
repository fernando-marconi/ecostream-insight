name: Coleta Automatica de Dados

on:
  schedule:
    # Roda no minuto 0 de cada hora (ex: 13:00, 14:00...)
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar dependencias
        run: pip install requests pandas

      - name: Executar coletor
        shell: bash
        env:
          WAQI_TOKEN: ${{ secrets.WAQI_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python src/coletor.py

      - name: Salvar alteracoes no repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/historico_ar.csv
          git commit -m "Atualizacao automatica: $(date)" || exit 0
          # O segredo está na linha abaixo: usamos o token para autorizar o push
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main